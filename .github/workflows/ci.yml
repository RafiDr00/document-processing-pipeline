# ──────────────────────────────────────────────────
#  CI/CD Pipeline — GitHub Actions
#  Lint → Test (with Redis service) → Docker build
# ──────────────────────────────────────────────────

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DOCKER_IMAGE: document-processing-pipeline

jobs:
  # ─── Lint & Type Check ───
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check app/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/

  # ─── Unit & Integration Tests ───
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install test tooling first (all pure wheels — guaranteed to succeed)
          pip install pytest==8.3.4 pytest-asyncio==0.24.0 pytest-cov==6.0.0 \
                      coverage httpx==0.28.1 aiosqlite==0.20.0
          # Install application dependencies
          pip install -r requirements.txt
          # Confirm pytest-cov is available
          python -c "import pytest_cov; print('pytest-cov', pytest_cov.__version__)"

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: testing
          LOG_LEVEL: WARNING
          LOG_FORMAT: text
          API_KEY: ""
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─── Docker Build ───
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:test -f docker/Dockerfile .
          docker run --rm ${{ env.DOCKER_IMAGE }}:test python -c "from app.main import app; print('✓ Application imports successfully')"
