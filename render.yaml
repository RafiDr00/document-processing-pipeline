databases:
  - name: docpipeline-db
    databaseName: docpipeline
    user: docpipeline
    plan: free

services:
  - type: web
    name: document-processing-pipeline
    runtime: docker
    plan: free
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docpipeline-db
          property: connectionString
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: STORAGE_BACKEND
        value: local
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: EXPORT_DIR
        value: /tmp/exports
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
      - key: OCR_LANG
        value: eng
      - key: API_KEY
        value: ""
      - key: RATE_LIMIT_REQUESTS
        value: "60"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: PORT
        value: "8000"